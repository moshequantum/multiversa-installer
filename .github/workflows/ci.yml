name: installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            tauri_args: ''
            rust_targets: ''
          - os: macos-14
            tauri_args: '--target universal-apple-darwin'
            rust_targets: 'x86_64-apple-darwin,aarch64-apple-darwin'
          - os: windows-2022
            tauri_args: ''
            rust_targets: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11.15.0
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}
      - name: Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: pnpm install --frozen-lockfile
      - name: Compile Tauri application
        run: pnpm tauri build ${{ matrix.tauri_args }}

  cli-contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/checkout@v6
        with:
          repository: moshequantum/multiversa-cli
          path: multiversa-cli
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
          cache-dependency-path: multiversa-cli/go.sum
      - name: Build compatible CLI
        run: go build -o "$RUNNER_TEMP/multiversa" ./cmd/multiversa
        working-directory: multiversa-cli
      - name: Verify capability and Project OS contract
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$RUNNER_TEMP:$PATH"
          test_home="$RUNNER_TEMP/e2e-home"
          capabilities="$(multiversa capabilities --json)"
          node -e 'const x=JSON.parse(process.argv[1]); if (!x.data.profile_schemas.includes("0.3-read-write")) process.exit(1)' "$capabilities"
          HOME="$test_home" multiversa tenant new ci-demo \
            --name "CI Demo OS" --os-name "CIDemoOS" --owner "CI" \
            --route lab --engagement self-service --json > "$RUNNER_TEMP/created.json"
          node -e 'const x=require(process.argv[1]); if (x.data.manifest.tenant.kind !== "project-os") process.exit(1)' "$RUNNER_TEMP/created.json"
          printf %s 'ci-synthetic-secret' | HOME="$test_home" multiversa tenant set-secret ci-demo CI_TEST_KEY --json > "$RUNNER_TEMP/secret.json"
          HOME="$test_home" multiversa tenant use ci-demo --json > "$RUNNER_TEMP/active.json"
          HOME="$test_home" multiversa tenant show ci-demo --json > "$RUNNER_TEMP/shown.json"
          test "$(stat -c '%a' "$test_home/.multiversa/tenants/ci-demo/vault")" = 700
          test "$(stat -c '%a' "$test_home/.multiversa/tenants/ci-demo/vault/secrets.env")" = 600
          ! grep -R 'ci-synthetic-secret' "$test_home/.multiversa/tenants/ci-demo/multiversa.toml" "$RUNNER_TEMP/created.json" "$RUNNER_TEMP/shown.json"
          node -e 'const x=require(process.argv[1]); if (x.data.action !== "use" || x.data.active !== "ci-demo") process.exit(1)' "$RUNNER_TEMP/active.json"
